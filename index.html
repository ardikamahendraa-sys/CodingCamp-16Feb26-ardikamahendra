<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!--- Tailwind CSS & Daisy UI CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@2.18.0/dist/full.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2/dist/tailwind.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="res/favicon.ico" />

    <title>TO-DOIT</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Todo List</h1>
        <!-- Error message -->
        <div class="alert-message"></div>

        <!-- Progress Section -->

        <!-- Input Section -->
        <div class="input-section">
          <input
            type="text"
            placeholder="Add a todo . . ."
            class="input w-full max-w-xs"
          />
          <input type="date" class="input w-full max-w-xs schedule-date" />
          <button class="btn bg-blue-700 hover:bg-blue-500 add-task-button">
            <i class="bx bx-plus bx-sm"></i>
          </button>
        </div>
      </header>

      <!-- Search and Filter Section -->
      <div class="search-filter-section mb-4 w-full">
        <div class="flex flex-col sm:flex-row gap-4 w-full">
          <!-- Search Bar -->
          <div class="flex-1">
            <div class="relative">
              <input
                type="text"
                placeholder="Search tasks... (Ctrl+F)"
                class="input bg-black border-blue-700 shadow-lg w-full pl-10 search-input"
              />
              <i
                class="bx bx-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"
              ></i>
            </div>
          </div>

          <!-- Filter Dropdown -->
          <div class="dropdown">
            <label
              tabindex="0"
              class="btn bg-black hover:bg-blue-700 border-blue-700 shadow-lg"
            >
              <i class="bx bx-filter mr-2"></i>
              Filter
            </label>
            <ul
              tabindex="0"
              class="dropdown-content menu p-2 shadow bg-base-100 rounded-box w-52"
            >
              <li><a data-filter="all">All Tasks</a></li>
              <li><a data-filter="pending">Pending</a></li>
              <li><a data-filter="completed">Completed</a></li>
            </ul>
          </div>
        </div>
      </div>

      <div class="todos-filter">
        <div class="flex gap-2">
          <div class="dropdown">
            <label
              tabindex="0"
              class="btn btn-ghost btn-sm text-white hover:bg-blue-700 border-blue-700 shadow-lg"
            >
              <i class="bx bx-sort mr-1"></i>
              Sort
            </label>
            <ul
              tabindex="0"
              class="dropdown-content menu p-2 bg-black rounded-box w-52 shadow-lg"
            >
              <li>
                <a
                  onclick="todoApp?.uiManager?.handleFilterTodos('all')"
                  class="hover:bg-blue-700 text-white"
                  >All</a
                >
              </li>
              <li>
                <a
                  onclick="todoApp?.uiManager?.handleFilterTodos('pending')"
                  class="hover:bg-blue-700 text-white"
                  >Pending</a
                >
              </li>
              <li>
                <a
                  onclick="todoApp?.uiManager?.handleFilterTodos('completed')"
                  class="hover:bg-blue-700 text-white"
                  >Completed</a
                >
              </li>
            </ul>
          </div>
        </div>

        <button
          class="btn btn-error delete-all-btn bg-blue-700 hover:bg-blue-500 text-white border-blue-700 hover:border-blue-500 shadow-lg"
        >
          <i class="bx bx-trash mr-2"></i>
          Delete All
        </button>
      </div>

      <div class="table-container overflow-x-auto text-white">
        <table class="table table-zebra w-full">
          <thead>
            <tr>
              <th class="w-2/5">Task</th>
              <th class="w-1/5">Due Date</th>
              <th class="w-1/5">Status</th>
              <th class="w-1/5">Actions</th>
            </tr>
          </thead>
          <tbody class="todos-list-body text-blue-700"></tbody>
        </table>
      </div>
    </div>

    <!-- JS -->
    <script src="js/script.js"></script>
  </body>
</html>
